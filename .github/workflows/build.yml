name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee build-output.log
          echo "Gradle exit: ${PIPESTATUS[0]}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-voice-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
