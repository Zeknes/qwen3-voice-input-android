name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set +e
          OUTPUT=$(./gradlew assembleDebug 2>&1)
          EXIT_CODE=$?
          # Write to step summary
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" | tail -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Build failed with exit code $EXIT_CODE"
            echo "$OUTPUT" | grep -i -E "(error|failure|failed|cannot|unable)" | head -20
          fi
          exit $EXIT_CODE

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-voice-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
