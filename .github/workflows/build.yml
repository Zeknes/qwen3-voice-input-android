name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Locate APK
        id: locate
        run: |
          echo "=== All files under app/build/outputs ==="
          find app/build/outputs -type f 2>/dev/null || echo "No outputs found"
          echo "=== All APK files in project ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: steps.locate.outputs.apk_path != ''
        with:
          name: qwen3-voice-debug
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30
