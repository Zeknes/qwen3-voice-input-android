name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"
          ls -la app/libs/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon --info 2>&1 > /tmp/build.log
          EXIT_CODE=$?
          echo "Gradle exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== LAST 500 LINES OF BUILD LOG ==="
            tail -500 /tmp/build.log
          fi
          exit $EXIT_CODE

      - name: Copy APK
        if: always()
        run: |
          mkdir -p /tmp/apk
          find app/build -name "*.apk" -exec cp {} /tmp/apk/ \; 2>/dev/null || true
          ls -la /tmp/apk/ 2>/dev/null || echo "no APK files"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-voice-debug
          path: /tmp/apk/*.apk
          retention-days: 30
          if-no-files-found: warn
