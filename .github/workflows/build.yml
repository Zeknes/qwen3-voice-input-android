name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Find APK
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" -type f -exec ls -la {} \;
          echo "=== APK outputs dir ==="
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-voice-debug
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error
