name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/sherpa-onnx.aar "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.0/sherpa-onnx-1.13.0.aar"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD FAILED - Last 200 lines ==="
            tail -200 /tmp/build.log
          fi
          exit $BUILD_EXIT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: qwen3-voice-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
